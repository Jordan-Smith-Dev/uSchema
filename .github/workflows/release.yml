name: Release Package

# This action will start when a correctly formatted tag is pushed (e.g. 0.1.0)

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  build:

    runs-on: windows-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Build frontend
      working-directory: src/Umbraco.Community.SchemaPreview/Client
      run: |
        npm ci
        npm run build

    - name: Build & Pack
      run: dotnet pack src\Umbraco.Community.SchemaPreview\Umbraco.Community.SchemaPreview.csproj -c Release /p:Version=${{github.ref_name}}

    - name: Push to NuGet
      run: dotnet nuget push **\*.nupkg -k ${{secrets.NUGET_API_KEY}} -s https://api.nuget.org/v3/index.json --skip-duplicate

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: v${{ github.ref_name }}
        generate_release_notes: true
        files: "**/*.nupkg"
